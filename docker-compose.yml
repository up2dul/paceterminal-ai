services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: paceterminal-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paceterminal-network

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: paceterminal-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - paceterminal-network

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paceterminal-app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/postgres?pgbouncer=true
      - DIRECT_URL=postgresql://postgres:password@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,https://paceterminal.com}
      - RATE_LIMIT_CHAT=${RATE_LIMIT_CHAT:-10/minute}
      - RATE_LIMIT_ANALYSIS=${RATE_LIMIT_ANALYSIS:-3/minute}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - paceterminal-network
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paceterminal-worker
    command: ["uv", "run", "celery", "-A", "app.celery", "worker", "--pool=threads", "-c", "4"]
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/postgres?pgbouncer=true
      - DIRECT_URL=postgresql://postgres:password@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DEBUG=${DEBUG:-False}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - paceterminal-network
    restart: unless-stopped

  # Celery Beat (Optional - for scheduled tasks)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paceterminal-beat
    command: ["uv", "run", "celery", "-A", "app.celery", "beat", "--loglevel=info"]
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/postgres?pgbouncer=true
      - DIRECT_URL=postgresql://postgres:password@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DEBUG=${DEBUG:-False}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - paceterminal-network
    restart: unless-stopped

  # Flower (Optional - Celery monitoring UI)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paceterminal-flower
    command: ["uv", "run", "celery", "-A", "app.celery", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - paceterminal-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  paceterminal-network:
    driver: bridge
